<div class="share-buttons">
    <h4>Share this article</h4>
    <div class="share-links">
        <a href="https://twitter.com/intent/tweet?text={{ page.title }}&url={{ page.url | absolute_url }}" 
           class="share-btn twitter" target="_blank" rel="noopener">
            <span>Twitter</span>
        </a>
        <a href="https://www.facebook.com/sharer/sharer.php?u={{ page.url | absolute_url }}" 
           class="share-btn facebook" target="_blank" rel="noopener">
            <span>Facebook</span>
        </a>
        <a href="https://t.me/share/url?url={{ page.url | absolute_url }}&text={{ page.title }}" 
           class="share-btn telegram" target="_blank" rel="noopener">
            <span>Telegram</span>
        </a>
        <a href="https://reddit.com/submit?url={{ page.url | absolute_url }}&title={{ page.title }}" 
           class="share-btn reddit" target="_blank" rel="noopener">
            <span>Reddit</span>
        </a>
        <a href="https://wa.me/?text={{ page.title }}%20{{ page.url | absolute_url }}" 
           class="share-btn whatsapp" target="_blank" rel="noopener">
            <span>WhatsApp</span>
        </a>
        <button class="share-btn copy-link" onclick="copyLink()">
            <span>Copy Link</span>
        </button>
    </div>
</div>

<script>
function copyLink() {
    const url = '{{ page.url | absolute_url }}';
    navigator.clipboard.writeText(url).then(() => {
        alert('Link copied to clipboard!');
    });
}
</script>
