<header class="site-header" role="banner">
  <div class="container">
    <div class="header-inner">
      <!-- Logo / Site Title -->
      <div class="site-branding">
        <a href="{{ '/' | relative_url }}" class="site-logo-link" aria-label="{{ site.title }}">
          {% if site.logo %}
          <img src="{{ site.logo | relative_url }}" alt="{{ site.title }}" class="site-logo" width="140" height="40">
          {% else %}
          <span class="site-title">{{ site.title }}</span>
          {% endif %}
        </a>
      </div>

      <!-- Navigation -->
      <nav class="site-nav" role="navigation" aria-label="Main navigation">
        <button class="nav-toggle" aria-expanded="false" aria-controls="nav-menu" aria-label="Toggle navigation">
          <span class="hamburger"></span>
          <span class="hamburger"></span>
          <span class="hamburger"></span>
        </button>
        <ul class="nav-menu" id="nav-menu" role="menubar">
          <li role="none"><a href="{{ '/' | relative_url }}" role="menuitem" {% if page.url == '/' %}aria-current="page"{% endif %}>Home</a></li>
          <li role="none" class="has-dropdown">
            <a href="#" role="menuitem" aria-haspopup="true" aria-expanded="false">Categories <span class="arrow">▾</span></a>
            <ul class="dropdown" role="menu">
              {% for category in site.categories %}
              <li role="none"><a href="{{ '/category/' | append: category[0] | slugify | relative_url }}" role="menuitem">{{ category[0] | capitalize }}</a></li>
              {% endfor %}
            </ul>
          </li>
          <li role="none"><a href="{{ '/blog/' | relative_url }}" role="menuitem" {% if page.url contains '/blog' %}aria-current="page"{% endif %}>Blog</a></li>
          <li role="none"><a href="{{ '/about/' | relative_url }}" role="menuitem" {% if page.url == '/about/' %}aria-current="page"{% endif %}>About</a></li>
        </ul>
      </nav>

      <!-- Search -->
      <div class="header-search">
        <button class="search-toggle" aria-label="Open search" aria-expanded="false">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <!-- Search Overlay -->
  <div class="search-overlay" id="search-overlay" role="dialog" aria-label="Search" aria-modal="true" hidden>
    <div class="search-box">
      <form action="{{ '/search/' | relative_url }}" method="get" role="search">
        <label for="search-input" class="sr-only">Search</label>
        <input type="search" id="search-input" name="q" placeholder="Search articles..." autocomplete="off" autofocus>
        <button type="submit" aria-label="Submit search">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
          </svg>
        </button>
      </form>
      <button class="search-close" aria-label="Close search">✕</button>
    </div>
  </div>
</header>
